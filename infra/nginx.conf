# whistle api reverse proxy. Install at /etc/nginx/sites-available/whistle-api
# and symlink into sites-enabled. Run certbot to populate the TLS paths.
# The agents app binds 127.0.0.1 only and is never exposed publicly.

server {
  listen 80;
  server_name api.whistle-agents.xyz;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name api.whistle-agents.xyz;

  ssl_certificate     /etc/letsencrypt/live/api.whistle-agents.xyz/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/api.whistle-agents.xyz/privkey.pem;

  # The live feed is Server-Sent Events: disable buffering and keep the
  # connection open so events stream to the browser in real time.
  location /v1/feed {
    proxy_pass http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header Connection '';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 1h;
  }

  location / {
    proxy_pass http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
